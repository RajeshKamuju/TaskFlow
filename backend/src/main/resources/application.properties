# ===================================================================
# DATABASE CONFIGURATION
# ===================================================================
# Defines the database URL. We connect to a MySQL database named 'task_db'.
# 'createDatabaseIfNotExist=true' tells MySQL to automatically create the database if it doesn't exist yet.
spring.datasource.url=jdbc:mysql://localhost:3306/task_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC

# Username of your MySQL database (Default is root)
spring.datasource.username=root

# Password of your MySQL database
spring.datasource.password=root

# Driver class name for MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================================
# HIBERNATE (JPA) CONFIGURATION
# ===================================================================
# 'update' automatically updates the database schema matching entity structures on server startup.
# In production, we'd use 'validate' or migrations like Flyway, but 'update' is standard for development!
spring.jpa.hibernate.ddl-auto=update

# Shows SQL queries in the console (logs) so you can debug what hibernate is doing behind the scenes.
spring.jpa.show-sql=true

# Formats the shown SQL nicely in the console.
spring.jpa.properties.hibernate.format_sql=true

# Specifies the MySQL dialect to help Hibernate optimize raw query generation.
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===================================================================
# SECURITY CONFIGURATION (JWT EXTRAS)
# ===================================================================
# Secret Key used to sign JWTs. Must be at least 256 bits (32 characters/bytes) long.
# This variable is referenced in our Security config package.
jwt.secret=9a6763a3d26a2f3a46272528342f7435424749534a6250654877375253545041

# Token lifetime (expiration) set in milliseconds (e.g., 86400000 ms = 24 hours)
jwt.expiration=86400000
